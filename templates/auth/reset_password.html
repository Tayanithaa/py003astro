{% extends "base.html" %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon">🔐</div>
      <h1 class="auth-title">{% if language=='ta' %}புதிய கடவுச்சொல்{% else %}New Password{% endif %}</h1>
    </div>
    {% if error %}
    <div class="auth-alert auth-alert-error">⚠️ {{ error }}</div>
    {% endif %}
    <form method="POST" class="auth-form">
      <div class="form-group">
        <label class="form-label">{% if language=='ta' %}புதிய கடவுச்சொல்{% else %}New Password{% endif %}</label>
        <input type="password" name="new_password" class="form-input" required minlength="8" placeholder="Min 8 characters">
      </div>
      <div class="form-group">
        <label class="form-label">{% if language=='ta' %}உறுதிப்படுத்தல்{% else %}Confirm New Password{% endif %}</label>
        <input type="password" name="confirm_password" class="form-input" required placeholder="Repeat password">
      </div>
      <button type="submit" class="auth-btn">✅ {% if language=='ta' %}கடவுச்சொல் மாற்று{% else %}Reset Password{% endif %}</button>
    </form>
  </div>
</div>
{% endblock %}
