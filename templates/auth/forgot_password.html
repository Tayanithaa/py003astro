{% extends "base.html" %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon">🔑</div>
      <h1 class="auth-title">{% if language=='ta' %}கடவுச்சொல் மீட்டமைப்பு{% else %}Reset Password{% endif %}</h1>
    </div>
    {% if message %}
    <div class="auth-alert auth-alert-success">✅ {{ message }}</div>
    {% endif %}
    <form method="POST" class="auth-form">
      <div class="form-group">
        <label class="form-label">{% if language=='ta' %}மின்னஞ்சல்{% else %}Email Address{% endif %}</label>
        <input type="email" name="email" class="form-input" required placeholder="your@email.com">
      </div>
      <button type="submit" class="auth-btn">📧 {% if language=='ta' %}மீட்டமைப்பு அனுப்பு{% else %}Send Reset Link{% endif %}</button>
    </form>
    <div class="auth-footer">
      <a href="{{ url_for('auth.login') }}" class="auth-link">← {% if language=='ta' %}உள்நுழைவுக்கு திரும்பு{% else %}Back to Login{% endif %}</a>
    </div>
  </div>
</div>
{% endblock %}
